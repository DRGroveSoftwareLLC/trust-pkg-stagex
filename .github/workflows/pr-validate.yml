# Action SHA pins (resolved 2026-03-24):
#   actions/checkout@v4.3.1 -> 34e114876b0b11c390a56381ad16ebd13914f8d5
#   docker/setup-buildx-action@v3.12.0 -> 8d2750c68a42422c14e847fe6c8ac0403b4cbd6f
#   docker/build-push-action@v7.0.0 -> d08e5c354a6adb9ed34480a06d141179aa583294
#   aquasecurity/trivy-action@v0.35.0 -> 57a97c7e7821a5776cebc9bb87c984fa69cba8f1
#   actions/upload-artifact@v4.6.2 -> ea165f8d65b6e75b540449e92b4886f43607fa02

name: PR Validation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  security-events: write

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set SOURCE_DATE_EPOCH from git commit
        run: echo "SOURCE_DATE_EPOCH=$(git log -1 --pretty=%ct)" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Build image (no push)
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        env:
          SOURCE_DATE_EPOCH: ${{ env.SOURCE_DATE_EPOCH }}
        with:
          context: .
          file: ./Containerfile
          push: false
          load: true
          tags: trust-pkg-stagex:pr-${{ github.event.pull_request.number }}
          build-args: |
            VERSION=pr-validation

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: trust-pkg-stagex:pr-${{ github.event.pull_request.number }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"

      - name: Upload scan results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: trivy-scan-results
          path: trivy-results.sarif
